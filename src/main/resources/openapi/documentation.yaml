openapi: "3.0.0"
info:
  title: "MakeBleja API"
  version: "1.0.0"
paths:
  /users:
    get:
      summary: "Get all users"
      responses:
        '200':
          description: "A list of users"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
components:
  schemas:
    UserResponse:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        surname: { type: string }
        nickname: { type: string }
        dateOfBirth: { type: string }
        homeAddress: { type: string }